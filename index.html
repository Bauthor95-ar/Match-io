<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>match.io — Conectamos marcas con atletas argentinos</title>
  <meta name="description" content="El marketplace donde las empresas encuentran deportistas argentinos para campañas, eventos, clinics y experiencias." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    body { font-family: 'Inter', sans-serif; color: #1B2A4A; background: #F5F8FC; overflow-x: hidden; }

    /* ===== COLOR VARIABLES ===== */
    :root {
      --celeste: #75AADB;
      --celeste-light: #A8D0F0;
      --celeste-dark: #4A7FAF;
      --white: #F5F8FC;
      --gold: #D4A017;
      --gold-light: #E8C547;
      --navy: #1B2A4A;
      --navy-light: #263B5E;
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

    /* ===== TOP STRIPE ===== */
    .top-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--celeste) 0%, var(--celeste) 33%, var(--gold) 33%, var(--gold) 66%, var(--celeste) 66%, var(--celeste) 100%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1001;
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 4px;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(245, 248, 252, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(117, 170, 219, 0.15);
      transition: box-shadow 0.3s ease;
    }
    .nav.scrolled { box-shadow: 0 2px 20px rgba(27, 42, 74, 0.08); }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--navy);
    }
    .nav-logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--navy-light);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a:hover { color: var(--celeste-dark); }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--celeste);
      transition: width 0.2s;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--celeste);
      color: white !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
    }
    .nav-cta:hover { background: var(--celeste-dark); transform: translateY(-1px); }
    .nav-cta::after { display: none !important; }

    /* Mobile menu */
    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .mobile-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--navy);
      margin: 6px 0;
      transition: all 0.3s;
    }
    .mobile-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .mobile-toggle.open span:nth-child(2) { opacity: 0; }
    .mobile-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

    @media (max-width: 768px) {
      .mobile-toggle { display: block; }
      .nav-links {
        position: fixed;
        top: 76px;
        left: 0;
        right: 0;
        background: rgba(245, 248, 252, 0.98);
        backdrop-filter: blur(12px);
        flex-direction: column;
        padding: 24px;
        gap: 20px;
        transform: translateY(-120%);
        transition: transform 0.3s ease;
        border-bottom: 1px solid rgba(117, 170, 219, 0.15);
      }
      .nav-links.open { transform: translateY(0); }
    }

    /* ===== SECTIONS ===== */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 24px;
    }
    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--celeste-dark);
      margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .section-subtitle {
      font-size: 17px;
      color: var(--navy-light);
      line-height: 1.6;
      max-width: 600px;
      opacity: 0.8;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: calc(100vh - 76px);
      display: flex;
      align-items: center;
      padding-top: 76px;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
    }
    @media (max-width: 768px) {
      .hero-inner { grid-template-columns: 1fr; text-align: center; gap: 40px; }
    }
    .hero-logo-placeholder {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) {
      .hero-logo-placeholder { margin: 0 auto 24px; }
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--navy);
      margin-bottom: 20px;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--celeste) 0%, var(--celeste-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 18px;
      line-height: 1.6;
      color: var(--navy-light);
      margin-bottom: 32px;
      opacity: 0.85;
    }
    .hero-ctas {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }
    @media (max-width: 768px) { .hero-ctas { justify-content: center; } }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .btn-primary {
      background: var(--celeste);
      color: white;
      border-color: var(--celeste);
    }
    .btn-primary:hover { background: var(--celeste-dark); border-color: var(--celeste-dark); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(117, 170, 219, 0.4); }
    .btn-outline {
      background: transparent;
      color: var(--navy);
      border-color: var(--navy);
    }
    .btn-outline:hover { background: var(--navy); color: white; transform: translateY(-2px); }
    .btn-gold {
      background: var(--gold);
      color: white;
      border-color: var(--gold);
    }
    .btn-gold:hover { background: #b8880f; border-color: #b8880f; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(212, 160, 23, 0.4); }
    .btn-white {
      background: white;
      color: var(--celeste-dark);
      border-color: white;
    }
    .btn-white:hover { background: var(--white); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    /* Stats */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) { .hero-stats { grid-template-columns: repeat(2, 1fr); } }
    .hero-stat { text-align: center; }
    .hero-stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--celeste-dark);
    }
    .hero-stat-label {
      font-size: 13px;
      color: var(--navy-light);
      opacity: 0.7;
      margin-top: 4px;
    }

    /* Hero image placeholder */
    .hero-image-placeholder {
      background: linear-gradient(135deg, var(--celeste-light) 0%, #d5e8f7 100%);
      border-radius: 20px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .hero-image-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
    }
    .placeholder-text {
      font-size: 14px;
      color: var(--celeste-dark);
      font-weight: 500;
      opacity: 0.6;
      z-index: 1;
      background: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 8px;
    }

    /* ===== COMO FUNCIONA ===== */
    .how-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 48px;
    }
    @media (max-width: 768px) { .how-grid { grid-template-columns: 1fr; } }
    .how-card {
      background: white;
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
      border: 1px solid rgba(117, 170, 219, 0.12);
      transition: all 0.3s ease;
      position: relative;
    }
    .how-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(27, 42, 74, 0.08); }
    .how-step {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--celeste-light), var(--celeste));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: white;
    }
    .how-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }
    .how-card p {
      font-size: 15px;
      color: var(--navy-light);
      line-height: 1.6;
      opacity: 0.8;
    }
    .how-arrow {
      display: none;
      position: absolute;
      right: -24px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--celeste);
      font-size: 24px;
    }
    @media (min-width: 769px) {
      .how-card:not(:last-child) .how-arrow { display: block; }
    }

    /* ===== ATHLETES ===== */
    .athletes-bg {
      background: linear-gradient(180deg, var(--white) 0%, #edf3fa 100%);
    }
    .athletes-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 48px;
    }
    @media (max-width: 960px) { .athletes-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .athletes-grid { grid-template-columns: 1fr; } }
    .athlete-card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      border: 1px solid rgba(117, 170, 219, 0.1);
      transition: all 0.3s ease;
    }
    .athlete-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(27, 42, 74, 0.08); }
    .athlete-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--celeste-light), var(--celeste));
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .athlete-sport {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--celeste-dark);
      background: rgba(117, 170, 219, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .athlete-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .athlete-team {
      font-size: 13px;
      color: var(--navy-light);
      opacity: 0.7;
      margin-bottom: 16px;
    }
    .athlete-metrics {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    .athlete-metric-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--navy);
    }
    .athlete-metric-label {
      font-size: 11px;
      color: var(--navy-light);
      opacity: 0.6;
    }
    .athlete-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .athlete-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--white);
      color: var(--navy-light);
      border: 1px solid rgba(117, 170, 219, 0.15);
    }

    /* CTA Banner */
    .cta-banner {
      margin-top: 60px;
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-banner-navy {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      color: white;
    }
    .cta-banner-celeste {
      background: linear-gradient(135deg, var(--celeste-light) 0%, #d5e8f7 100%);
      color: var(--navy);
    }
    .cta-banner h3 {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .cta-banner p {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 28px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== BRANDS ===== */
    .brands-logos {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .brand-logo-placeholder {
      width: 120px;
      height: 48px;
      border-radius: 8px;
      background: rgba(117, 170, 219, 0.08);
      border: 1px dashed rgba(117, 170, 219, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--celeste-dark);
      opacity: 0.5;
    }
    .brands-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 32px;
    }
    @media (max-width: 768px) { .brands-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .brands-grid { grid-template-columns: 1fr; } }
    .brand-value-card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      border: 1px solid rgba(117, 170, 219, 0.1);
      transition: all 0.3s ease;
    }
    .brand-value-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(27, 42, 74, 0.06); }
    .brand-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(117, 170, 219, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 22px;
    }
    .brand-value-card h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .brand-value-card p {
      font-size: 14px;
      color: var(--navy-light);
      opacity: 0.7;
      line-height: 1.5;
    }

    /* ===== ABOUT ===== */
    .about-bg {
      background: linear-gradient(180deg, var(--white) 0%, #edf3fa 100%);
    }
    .about-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-top: 48px;
    }
    @media (max-width: 768px) { .about-content { grid-template-columns: 1fr; } }
    .about-text p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--navy-light);
      margin-bottom: 16px;
    }
    .about-image-placeholder {
      background: linear-gradient(135deg, var(--celeste-light) 0%, #d5e8f7 100%);
      border-radius: 20px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .founders-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-top: 48px;
    }
    @media (max-width: 560px) { .founders-grid { grid-template-columns: 1fr; } }
    .founder-card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(117, 170, 219, 0.1);
    }
    .founder-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .founder-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .founder-role {
      font-size: 13px;
      color: var(--celeste-dark);
      font-weight: 600;
      margin-bottom: 12px;
    }
    .founder-bio {
      font-size: 14px;
      color: var(--navy-light);
      opacity: 0.75;
      line-height: 1.5;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--navy);
      color: white;
      padding: 48px 24px;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
    }
    .footer-tagline {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 4px;
    }
    .footer-links {
      display: flex;
      gap: 24px;
    }
    .footer-links a {
      color: white;
      opacity: 0.6;
      text-decoration: none;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 1; }
    .footer-copy {
      width: 100%;
      text-align: center;
      font-size: 13px;
      opacity: 0.4;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    /* ===== FORMS ===== */
    .form-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .form-container.open {
      max-height: 2000px;
      opacity: 1;
    }
    .form-wrapper {
      background: white;
      border-radius: 20px;
      padding: 40px;
      margin-top: 32px;
      border: 1px solid rgba(117, 170, 219, 0.12);
      box-shadow: 0 4px 24px rgba(27, 42, 74, 0.05);
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full-width { grid-column: 1 / -1; }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .form-group label .required { color: var(--celeste-dark); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 16px;
      border: 1.5px solid rgba(117, 170, 219, 0.2);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--navy);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--celeste);
      box-shadow: 0 0 0 3px rgba(117, 170, 219, 0.15);
    }
    .form-group textarea { resize: vertical; min-height: 100px; }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--navy-light);
      cursor: pointer;
    }

    function SolDeMayo({ size = 36, color = "#D4A017" }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100" className="sol-de-mayo" aria-label="Sol de Mayo">
          <defs>
            <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#E8C547" />
              <stop offset="100%" stopColor="#D4A017" />
            </linearGradient>
          </defs>
          {/* Rays */}
          {[...Array(16)].map((_, i) => {
            const angle = (i * 22.5) * Math.PI / 180;
            const isLong = i % 2 === 0;
            const innerR = isLong ? 28 : 30;
            const outerR = isLong ? 48 : 38;
            const x1 = 50 + innerR * Math.cos(angle);
            const y1 = 50 + innerR * Math.sin(angle);
            const x2 = 50 + outerR * Math.cos(angle);
            const y2 = 50 + outerR * Math.sin(angle);
            return (
              <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                stroke="url(#solGrad)" strokeWidth={isLong ? 2.5 : 1.5}
                strokeLinecap="round" />
            );
          })}
          {/* Face circle */}
          <circle cx="50" cy="50" r="22" fill="url(#solGrad)" />
          <circle cx="50" cy="50" r="18" fill="none" stroke="#b8880f" strokeWidth="0.5" opacity="0.4" />

    // ===== INTERSECTION OBSERVER HOOK =====
    function useInView(options = {}) {
      const ref = React.useRef(null);
      const [isVisible, setIsVisible] = React.useState(false);
      React.useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsVisible(true);
            observer.unobserve(entry.target);
          }
        }, { threshold: 0.1, ...options });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return [ref, isVisible];
    }

        <section id="nosotros" className="about-bg">
          <div className="section">
            <AnimatedSection>
              <span className="section-label">El equipo</span>
              <h2 className="section-title">Quiénes somos</h2>
            </AnimatedSection>

            <div className="about-content">
              <AnimatedSection delay={0.1}>
                <div className="about-text">
                  <p>
                    Somos un equipo que combina pasión por el deporte argentino con experiencia en marketing y tecnología. Creamos match.io porque vimos una oportunidad enorme: miles de atletas con historias increíbles y audiencias comprometidas, pero sin acceso directo a marcas que buscan exactamente eso.
                  </p>
                  <p>
                    Nuestra misión es democratizar el sponsorship deportivo. Que cualquier marca — desde una startup hasta una multinacional — pueda conectar con atletas reales, con métricas transparentes y gestión profesional.
                  </p>
                  <p>
                    Trabajamos con rugby, hockey, BMX, vóley, natación, atletismo y muchos deportes más. Si hay un atleta con talento y una marca con ganas de conectar, nosotros hacemos el match.
                  </p>
                </div>
              </AnimatedSection>
              <AnimatedSection delay={0.2}>
                <div className="about-image-placeholder">
                  <span className="placeholder-text">📸 Foto del equipo</span>
                </div>
              </AnimatedSection>
            </div>

            <div className="founders-grid">
              {founders.map((f, i) => (
                <AnimatedSection key={f.name} delay={i * 0.15}>
                  <div className="founder-card">
                    <div className="founder-avatar">{f.emoji}</div>
                    <div className="founder-name">{f.name}</div>
                    <div className="founder-role">{f.role}</div>
                    <div className="founder-bio">{f.bio}</div>
                  </div>
                </AnimatedSection>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ===== FOOTER =====

          <div className="footer-inner">
            <div>
              <div className="footer-logo">
                <SolDeMayo size={28} color="#E8C547" />
